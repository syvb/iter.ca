name: Deploy to Neocities

on:
  push:
    # don't run on pushes that exclusively modify files in these directories
    paths-ignore:
      - 'build-data/**'
      - 'miniposts/**'
      - 'ops/**'
      - 'about/**'
      - 'binformats/**'
      - 'selfdata/**'
      - 'self/**'
      - 'bin/**'
      - 'notes/**'
    branches:
      - master
  # deploy after regen completes (e.g. after notes changes)
  workflow_run:
    workflows: ["Regen (sans thumbnails)"]
    types:
      - completed
  # ensure scheduled posts get posted automatically
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    name: Deploy to Neocities
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Clone repo
        uses: actions/checkout@master
        with:
          # needed for Hugo Git data
          fetch-depth: '0'
      - name: Install Hugo
        run: |
          curl -L https://github.com/gohugoio/hugo/releases/download/v0.98.0/hugo_extended_0.98.0_Linux-64bit.tar.gz > hugo.tar.gz
          tar xvzf hugo.tar.gz
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      # we only regen subrepos on scheduled jobs, since the Neocities actions never deletes files
      # we don't lose anything
      - name: Check if subrepos.sh changed
        id: subrepos-changed
        if: ${{ github.event_name == 'push' }}
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^subrepos\.sh$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install stable toolchain
        if: ${{ (github.event_name != 'push' && github.event_name != 'workflow_run') || steps.subrepos-changed.outputs.changed == 'true' }}
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - name: Install wasm-pack
        if: ${{ (github.event_name != 'push' && github.event_name != 'workflow_run') || steps.subrepos-changed.outputs.changed == 'true' }}
        run: |
           curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh 
      - name: Create subrepos
        if: ${{ (github.event_name != 'push' && github.event_name != 'workflow_run') || steps.subrepos-changed.outputs.changed == 'true' }}
        run: ./subrepos.sh
      - name: Build
        run: ./hugo -v -t smitop
      - name: Prep for Neocities
        run: |
          # uncomment for free plan:
          # find ./public -type f | grep -vE '(asc|atom|bin|css|csv|dae|eot|epub|geojson|gif|gltf|htm|html|ico|jpeg|jpg|js|json|key|kml|knowl|less|manifest|markdown|md|mf|mid|midi|mtl|obj|opml|otf|pdf|pgp|png|rdf|rss|sass|scss|svg|text|tsv|ttf|txt|webapp|webmanifest|webp|woff|woff2|xcf|xml)' | xargs rm
          cp public/404.html public/not_found.html
      # When the dist_dir is ready, deploy it to neocities
      - name: Deploy to neocities
        uses: bcomnes/deploy-to-neocities@v3
        with:
          api_key: ${{ secrets.NEOCITIES_API_TOKEN }}
          cleanup: false
          dist_dir: public
          neocities_supporter: true
