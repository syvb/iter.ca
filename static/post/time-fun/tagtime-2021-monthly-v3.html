<style>
  html, body { background:#0f1416; color:#e6edf0; font-family: -apple-system, "SF Pro Text", system-ui, sans-serif; margin:0; }
  .wrap { padding: 16px; }

  svg { background:#14191c; border-radius: 6px; max-width:100%; height:auto; }
  .legend-wrap { flex:0 1 auto; font-size:12px; }
  .legend-wrap summary { cursor:pointer; padding:6px 10px; background:#14191c; border-radius:6px; user-select:none; color:#bcc6cc; list-style:none; font-size:12px; }
  .legend-wrap summary::-webkit-details-marker { display:none; }
  .legend-wrap summary::before { content:"▸ "; display:inline-block; transition:transform .15s; color:#7b8b92; }
  .legend-wrap[open] summary::before { transform:rotate(90deg); }
  .legend-wrap[open] { flex:1 1 210px; min-width:0; }
  .legend-wrap[open] summary { margin-bottom:6px; }
  .legend { display:flex; flex-direction:column; gap:3px; }
  .legend .row { display:flex; align-items:center; gap:8px; padding:3px 6px; border-radius:4px; }
  .legend .sw { width:12px; height:12px; border-radius:2px; flex:none; }
  .legend .name { flex:1; }
  .legend .hrs { color:#8fa0a8; font-variant-numeric: tabular-nums; font-size:11px; }
  .axis { fill:#7b8b92; font-size:11px; }
  .tick { stroke:#2a3236; }
  .monthlbl { fill:#c9d1d6; font-size:12px; font-weight:500; }
  .hrlbl { font-size:10px; font-weight:600; pointer-events:none; }
  #tip {
    position: fixed; pointer-events:none; background:#1a2124; border:1px solid #2a3236;
    border-radius:6px; padding:8px 10px; font-size:12px; color:#e6edf0;
    box-shadow:0 6px 24px rgba(0,0,0,.45); display:none; z-index:10; min-width:220px;
  }
  #tip .d { font-weight:600; margin-bottom:4px; }
  #tip table { border-collapse:collapse; font-variant-numeric: tabular-nums; }
  #tip td { padding: 1px 4px; }
  #tip td.v { text-align:right; color:#bcc6cc; }
  #tip td.s { width:10px; }
  #tip td.s span { display:inline-block; width:8px; height:8px; border-radius:2px; }
  .bar rect.stack { transition: filter .15s; }
  .bar:hover rect.stack { filter: brightness(1.12); }

<script>
const DATA = JSON.parse(document.getElementById("data").textContent);
// Order matches DATA.categories:
// Sleep, Video, Social/News, Eating, Transit, Outdoors, Coding, Security,
// Research, Job search, School, Self-directed, Finance, Wiki, Creative,
// Gaming, Web browsing, Personal care, Other
const COLORS = [
  "#2a3c4a", // Sleep
  "#a0c44e", // Video
  "#6fbda6", // Social/News
  "#d9a96b", // Eating
  "#8a6fa8", // Transit
  "#6fb07f", // Outdoors
  "#22d3ee", // Coding (cyan)
  "#f5c542", // Security
  "#b891d9", // Research
  "#f07ea8", // Job search
  "#e25f5f", // School
  "#d98aa0", // Self-directed
  "#4fb678", // Finance
  "#cdd3d8", // Wiki
  "#5f9ee0", // Creative
  "#e08a3e", // Gaming
  "#9aa1a9", // Web browsing
  "#c7b299", // Personal care
  "#3d464a", // Other
];

const CATS = DATA.categories;
const months = DATA.labels;
const data = DATA.data;

const W = 980, H = 560, PAD_L = 54, PAD_R = 24, PAD_T = 14, PAD_B = 52;
const plotW = W - PAD_L - PAD_R;
const plotH = H - PAD_T - PAD_B;
const barW = plotW / months.length;
const barPad = 10;

const svgNS = "http://www.w3.org/2000/svg";
const svg = document.createElementNS(svgNS, "svg");
svg.setAttribute("width", W); svg.setAttribute("height", H);
svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

const yFor = hrs => PAD_T + plotH * (1 - hrs/24);

for (let h = 0; h <= 24; h += 2){
  const y = yFor(h);
  const line = document.createElementNS(svgNS, "line");
  line.setAttribute("x1", PAD_L); line.setAttribute("x2", W-PAD_R);
  line.setAttribute("y1", y); line.setAttribute("y2", y);
  line.setAttribute("class", "tick");
  svg.appendChild(line);
  if (h % 4 === 0){
    const lbl = document.createElementNS(svgNS, "text");
    lbl.setAttribute("x", PAD_L - 8); lbl.setAttribute("y", y+3);
    lbl.setAttribute("text-anchor", "end");
    lbl.setAttribute("class", "axis");
    lbl.textContent = h + "h";
    svg.appendChild(lbl);
  }
}

function fmtHours(mins){
  const h = mins/60;
  if (h >= 1) return h.toFixed(1) + "h";
  return Math.round(mins) + "m";
}
function fmtHM(mins){
  const h = Math.floor(mins/60);
  const m = Math.round(mins - h*60);
  if (h === 0 && m === 0) return "0";
  if (h === 0) return m + "m";
  if (m === 0) return h + "h";
  return h + "h " + m + "m";
}
function labelColor(hex){
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const L = 0.2126*r + 0.7152*g + 0.0722*b;
  return L > 150 ? "#0f1416" : "#f3f6f8";
}

const tip = document.getElementById("tip");
for (let i = 0; i < months.length; i++){
  const g = document.createElementNS(svgNS, "g");
  g.setAttribute("class","bar");
  const bx = PAD_L + i*barW + barPad/2;
  const bw = barW - barPad;
  let yAcc = PAD_T + plotH;
  for (let c = 0; c < CATS.length; c++){
    const mins = data[i][c];
    if (mins <= 0) continue;
    const hrs = mins/60;
    const h = plotH * (hrs/24);
    const rect = document.createElementNS(svgNS, "rect");
    rect.setAttribute("class","stack");
    rect.setAttribute("x", bx);
    rect.setAttribute("y", yAcc - h);
    rect.setAttribute("width", bw);
    rect.setAttribute("height", h);
    rect.setAttribute("fill", COLORS[c]);
    g.appendChild(rect);
    if (mins >= 30 && h >= 14){
      const t = document.createElementNS(svgNS, "text");
      t.setAttribute("class","hrlbl");
      t.setAttribute("x", bx + bw/2);
      t.setAttribute("y", yAcc - h/2 + 3.5);
      t.setAttribute("text-anchor","middle");
      t.setAttribute("fill", labelColor(COLORS[c]));
      t.textContent = fmtHours(mins);
      g.appendChild(t);
    }
    yAcc -= h;
  }
  const mlbl = document.createElementNS(svgNS, "text");
  mlbl.setAttribute("class","monthlbl");
  mlbl.setAttribute("x", bx + bw/2);
  mlbl.setAttribute("y", PAD_T + plotH + 18);
  mlbl.setAttribute("text-anchor","middle");
  mlbl.textContent = months[i];
  svg.appendChild(mlbl);
  const sub = document.createElementNS(svgNS, "text");
  sub.setAttribute("class","axis");
  sub.setAttribute("x", bx + bw/2);
  sub.setAttribute("y", PAD_T + plotH + 34);
  sub.setAttribute("text-anchor","middle");
  sub.textContent = DATA.pingsIn[i] + " pings";
  svg.appendChild(sub);
  const hit = document.createElementNS(svgNS, "rect");
  hit.setAttribute("x", bx); hit.setAttribute("y", PAD_T);
  hit.setAttribute("width", bw); hit.setAttribute("height", plotH);
  hit.setAttribute("fill","transparent");
  hit.addEventListener("mousemove", e => showTip(e, i));
  hit.addEventListener("mouseleave", () => tip.style.display="none");
  g.appendChild(hit);
  svg.appendChild(g);
}
function showTip(evt, i){
  const rows = data[i].map((m,c) => ({m, c, n: CATS[c], col: COLORS[c]}))
    .filter(r => r.m > 0).sort((a,b) => b.m - a.m);
  let html = `<div class="d">${months[i]} 2021 · ${DATA.daysIn[i]} days, ${DATA.pingsIn[i]} pings</div><table>`;
  for (const r of rows){
    html += `<tr><td class="s"><span style="background:${r.col}"></span></td><td>${r.n}</td><td class="v">${fmtHM(r.m)}</td></tr>`;
  }
  html += "</table>";
  tip.innerHTML = html;
  tip.style.display = "block";
  const pad = 14;
  let left = evt.clientX + pad, top = evt.clientY + pad;
  const r = tip.getBoundingClientRect();
  if (left + r.width > window.innerWidth - 10) left = evt.clientX - r.width - pad;
  if (top + r.height > window.innerHeight - 10) top = evt.clientY - r.height - pad;
  tip.style.left = left + "px"; tip.style.top = top + "px";
}
document.getElementById("plot").appendChild(svg);
if (!matchMedia("(min-width: 900px)").matches) document.querySelector(".legend-wrap").open = false;
function reportH(){ parent.postMessage({ttH:document.body.scrollHeight, ttSrc:location.pathname.split("/").pop()}, "*"); }
new ResizeObserver(reportH).observe(document.body);
addEventListener("load", reportH);
const legend = document.getElementById("legend");
const yearTotals = CATS.map((_, c) => data.reduce((s, row, i) => s + (row[c]/60)*DATA.daysIn[i], 0));
const yearSum = yearTotals.reduce((a,b)=>a+b, 0);
for (let c = 0; c < CATS.length; c++){
  const row = document.createElement("div");
  row.className = "row";
  row.innerHTML = `
    <div class="sw" style="background:${COLORS[c]}"></div>
    <div class="name">${CATS[c]}</div>
    <div class="hrs">${Math.round(yearTotals[c])}h · ${((yearTotals[c]/yearSum)*100).toFixed(1)}%</div>`;
  legend.appendChild(row);
}
</script>
</body>
</html>
